name: Deploy to Railway

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PROJECT_ID: "023ba619-4b39-47b1-a8c4-c6c6f130f4c8"
  SERVICE_ID: "f91c48bd-cb37-4a45-9a40-2571c55827bd"
  ENV_ID: "db932418-3d25-4cce-a91a-759295d6f271"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set env vars and connect GitHub repo to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
        run: |
          # Set DISCORD_TOKEN
          curl -s -X POST https://backboard.railway.app/graphql/v2 \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"query\":\"mutation { variableUpsert(input: { projectId: \\\"$PROJECT_ID\\\", environmentId: \\\"$ENV_ID\\\", serviceId: \\\"$SERVICE_ID\\\", name: \\\"DISCORD_TOKEN\\\", value: \\\"$DISCORD_TOKEN\\\" }) }\"}" > /dev/null
          echo "✅ DISCORD_TOKEN set"

          curl -s -X POST https://backboard.railway.app/graphql/v2 \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"query\":\"mutation { variableUpsert(input: { projectId: \\\"$PROJECT_ID\\\", environmentId: \\\"$ENV_ID\\\", serviceId: \\\"$SERVICE_ID\\\", name: \\\"PYTHONUNBUFFERED\\\", value: \\\"1\\\" }) }\"}" > /dev/null
          echo "✅ PYTHONUNBUFFERED set"

          # Connect GitHub repo as source for the service
          CONNECT_RESP=$(curl -s -X POST https://backboard.railway.app/graphql/v2 \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"query\":\"mutation { serviceInstanceUpdate(serviceId: \\\"$SERVICE_ID\\\", environmentId: \\\"$ENV_ID\\\", input: { source: { repo: \\\"nandraghav08-afk/host-bot\\\" } }) }\"}")
          echo "Connect response: $CONNECT_RESP"

          # Try alternative: create a deployment directly
          DEPLOY_RESP=$(curl -s -X POST https://backboard.railway.app/graphql/v2 \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"query\":\"mutation { serviceInstanceDeploy(serviceId: \\\"$SERVICE_ID\\\", environmentId: \\\"$ENV_ID\\\") }\"}")
          echo "Deploy response: $DEPLOY_RESP"

          # List available mutations to understand the schema
          SCHEMA_RESP=$(curl -s -X POST https://backboard.railway.app/graphql/v2 \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"query":"{ __type(name: \"Mutation\") { fields { name } } }"}')
          echo "$SCHEMA_RESP" | python3 -c "
import sys, json
d = json.load(sys.stdin)
fields = d.get('data', {}).get('__type', {}).get('fields', [])
names = [f['name'] for f in fields if any(k in f['name'].lower() for k in ['deploy', 'service', 'source'])]
print('Relevant mutations:', names[:30])
" 2>/dev/null || echo "Schema query failed"
