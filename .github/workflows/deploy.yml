name: Deploy to Railway

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PROJECT_ID: "023ba619-4b39-47b1-a8c4-c6c6f130f4c8"
  SERVICE_ID: "f91c48bd-cb37-4a45-9a40-2571c55827bd"
  ENV_ID: "db932418-3d25-4cce-a91a-759295d6f271"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Set environment variables on Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
        run: |
          set_var() {
            curl -s -X POST https://backboard.railway.app/graphql/v2 \
              -H "Authorization: Bearer $RAILWAY_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"query\":\"mutation { variableUpsert(input: { projectId: \\\"$PROJECT_ID\\\", environmentId: \\\"$ENV_ID\\\", serviceId: \\\"$SERVICE_ID\\\", name: \\\"$1\\\", value: \\\"$2\\\" }) }\"}" > /dev/null
            echo "Set var: $1"
          }
          set_var "DISCORD_TOKEN" "$DISCORD_TOKEN"
          set_var "PYTHONUNBUFFERED" "1"

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --project $PROJECT_ID --service $SERVICE_ID --detach
